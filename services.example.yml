version: "1.0"

# Global settings
settings:
  default_view: environment  # environment, project, team, category, custom
  theme: auto                # light, dark, auto
  health_check:
    enabled: true
    interval: 300            # seconds
    timeout: 5               # seconds

# Service definitions
services:
  - id: payment-api
    name: Payment API
    description: Core payment processing service
    icon: 💳
    tags:
      - microservice
      - critical
      - backend
    team: payments
    owner: john.doe@company.com
    repository: https://github.com/company/payment-api
    
    links:
      # Production environment
      - label: Production
        environment: production
        items:
          - name: API Endpoint
            url: https://api.company.com/payments
            icon: 🌐
            health_check: true
            
          - name: Swagger Docs
            url: https://api.company.com/payments/swagger
            icon: 📖
            
          - name: Grafana Dashboard
            url: https://grafana.company.com/d/payment-api-prod
            icon: 📊
            
          - name: Kibana Logs
            url: https://kibana.company.com/app/logs?service=payment-api
            icon: 📜
            
          - name: K8s Dashboard
            url: https://k8s.company.com/workloads/payment-api
            icon: 🐳
      
      # UAT environment
      - label: UAT
        environment: uat
        items:
          - name: API Endpoint
            url: https://api.uat.company.com/payments
            icon: 🌐
            health_check:
              enabled: true
              url: https://api.uat.company.com/payments/health
              method: GET
              expected_status: 200
          
          - name: Swagger Docs
            url: https://api.uat.company.com/payments/swagger
            icon: 📖

      # Development environment
      - label: Development
        environment: dev
        items:
          - name: Local API
            url: http://localhost:3000/payments
            icon: 🌐
            health_check:
              enabled: true
              mode: client-side  # Browser makes request (CORS)

  - id: redis-cache
    name: Redis Cache
    description: Session and cache storage
    icon: 🔴
    tags:
      - infrastructure
      - cache
      - critical
    team: platform
    owner: platform@company.com
    
    links:
      - label: Production
        environment: production
        items:
          - name: Redis Insight
            url: https://redis.company.com
            icon: 🔍
            health_check: false  # Behind VPN, not accessible
          
          - name: Grafana Metrics
            url: https://grafana.company.com/d/redis-prod
            icon: 📊

  - id: user-service
    name: User Service
    description: User authentication and management
    icon: 👤
    tags:
      - microservice
      - backend
    team: identity
    owner: identity-team@company.com
    repository: https://github.com/company/user-service
    
    links:
      - label: Production
        environment: production
        items:
          - name: API Endpoint
            url: https://api.company.com/users
            icon: 🌐
            health_check:
              enabled: true
              provider: prometheus
              query: up{job="user-service"}
              endpoint: https://prometheus.company.com
          
          - name: Swagger Docs
            url: https://api.company.com/users/swagger
            icon: 📖
          
          - name: Admin Panel
            url: https://admin.company.com/users
            icon: ⚙️

# Custom groupings
groups:
  - name: Payment System
    type: project
    services:
      - payment-api
      - payment-worker
      - fraud-detection
  
  - name: Core Infrastructure
    type: category
    services:
      - redis-cache
      - postgres
      - kafka
  
  - name: Platform Team Services
    type: team
    services:
      - redis-cache
      - user-service
