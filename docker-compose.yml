version: '3.8'

services:
  directo:
    build: .
    image: directo:latest
    container_name: directo
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HEALTH_CACHE_TTL=300
    volumes:
      # Mount custom services.yml (optional)
      - ./services.yml:/app/backend/services.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
