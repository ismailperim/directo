<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directo - Service Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="bg-background">
  <!-- Header -->
  <header class="border-b border-border bg-card/50 backdrop-blur-sm sticky top-0 z-10">
    <div class="container mx-auto px-6 py-4">
      <div class="flex items-center justify-between gap-4">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold">Directo</h1>
            <p class="text-sm opacity-60">Navigate your services</p>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 flex-1 max-w-2xl">
          <!-- Search -->
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search services, projects, or tags..."
              class="flex h-9 w-full rounded-md border border-border bg-input-background px-3 py-1 pl-10 text-sm transition-all outline-none placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] disabled:cursor-not-allowed disabled:opacity-50 md:text-sm dark:bg-muted dark:border-muted"
            />
          </div>

          <!-- View Mode -->
          <select id="viewMode" class="flex h-9 items-center justify-between rounded-md border border-border bg-input-background px-3 py-2 text-sm transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] disabled:cursor-not-allowed disabled:opacity-50 w-[180px] dark:bg-muted dark:border-muted appearance-none cursor-pointer">
            <option value="environment">By Environment</option>
            <option value="project">By Project</option>
            <option value="team">By Team</option>
          </select>

          <!-- Filter Button -->
          <button id="filterBtn" class="inline-flex items-center justify-center rounded-md border border-border bg-background text-foreground hover:bg-accent hover:text-accent-foreground h-9 w-9 transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-input/30 dark:border-input dark:hover:bg-input/50" title="Filters">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
            </svg>
          </button>

          <!-- Settings Button -->
          <button id="settingsBtn" class="inline-flex items-center justify-center rounded-md border border-border bg-background text-foreground hover:bg-accent hover:text-accent-foreground h-9 w-9 transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-input/30 dark:border-input dark:hover:bg-input/50" title="Settings">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Filter Bar -->
  <div id="filterBar" class="border-b border-border bg-card/30 backdrop-blur-sm" style="display: none;">
    <div class="container mx-auto px-6 py-3">
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2 text-sm opacity-60">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
          </svg>
          <span>Active Filters:</span>
        </div>
        <div id="activeFilters" class="flex items-center gap-2 flex-wrap"></div>
        <button id="clearFiltersBtn" class="text-sm opacity-60 hover:opacity-100 transition-opacity">
          Clear all
        </button>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading" class="container mx-auto px-6 py-12 text-center">
    <div class="inline-block w-12 h-12 border-4 border-border border-t-primary rounded-full animate-spin"></div>
    <p class="mt-4 opacity-60">Loading services...</p>
  </div>

  <!-- Error State -->
  <div id="error" class="container mx-auto px-6 py-12 text-center" style="display: none;">
    <p id="errorMessage" class="text-destructive mb-4"></p>
    <button onclick="location.reload()" class="inline-flex items-center justify-center gap-2 rounded-md bg-primary text-primary-foreground hover:bg-primary/90 h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]">
      Retry
    </button>
  </div>

  <!-- Main Content -->
  <main id="content" class="container mx-auto px-6 py-6 space-y-8" style="display: none;">
    <!-- Services will be rendered here -->
  </main>

  <!-- Filter Modal -->
  <div id="filterModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center" style="display: none;">
    <div class="bg-background border border-border rounded-xl w-full max-w-2xl mx-4 shadow-2xl">
      <div class="flex items-center justify-between p-6 border-b border-border">
        <h2 class="text-xl font-semibold">Filters</h2>
        <button onclick="closeFilters()" class="p-2 hover:bg-accent rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-6 space-y-6 max-h-[60vh] overflow-y-auto">
        <div>
          <h4 class="text-base font-medium mb-3">Environments</h4>
          <div id="environmentFilters" class="space-y-1 p-2 bg-accent/30 rounded-lg border border-border/50"></div>
        </div>
        <div>
          <h4 class="text-base font-medium mb-3">Teams</h4>
          <div id="teamFilters" class="space-y-1 p-2 bg-accent/30 rounded-lg border border-border/50"></div>
        </div>
        <div>
          <h4 class="text-base font-medium mb-3">Tags</h4>
          <div id="tagFilters" class="space-y-1 p-2 bg-accent/30 rounded-lg border border-border/50"></div>
        </div>
        <div>
          <h4 class="text-base font-medium mb-3">Services</h4>
          <div id="serviceFilters" class="space-y-1 p-2 bg-accent/30 rounded-lg border border-border/50"></div>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 p-6 border-t border-border">
        <button onclick="clearFilters()" class="inline-flex items-center justify-center gap-2 rounded-md border border-border bg-background text-foreground hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-input/30 dark:border-input dark:hover:bg-input/50">
          Clear All
        </button>
        <button onclick="closeFilters()" class="inline-flex items-center justify-center gap-2 rounded-md border border-border bg-background text-foreground hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-input/30 dark:border-input dark:hover:bg-input/50">
          Cancel
        </button>
        <button onclick="applyFilters()" class="inline-flex items-center justify-center gap-2 rounded-md bg-primary text-primary-foreground hover:bg-primary/90 h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]">
          Apply
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center" style="display: none;">
    <div class="bg-background border border-border rounded-xl w-full max-w-md mx-4 shadow-2xl">
      <div class="flex items-center justify-between p-6 border-b border-border">
        <h2 class="text-xl font-semibold">Settings</h2>
        <button onclick="closeSettings()" class="p-2 hover:bg-accent rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-6 space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">Theme</label>
          <select id="themeSelect" class="flex h-9 w-full items-center justify-between rounded-md border border-border bg-input-background px-3 py-2 text-sm transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-muted dark:border-muted appearance-none cursor-pointer">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Default View</label>
          <select id="defaultViewSelect" class="flex h-9 w-full items-center justify-between rounded-md border border-border bg-input-background px-3 py-2 text-sm transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-muted dark:border-muted appearance-none cursor-pointer">
            <option value="environment">Environment</option>
            <option value="project">Project</option>
            <option value="team">Team</option>
          </select>
        </div>
        <div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="compactMode" class="w-4 h-4 rounded border-border accent-primary">
            <span class="text-sm">Compact mode</span>
          </label>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 p-6 border-t border-border">
        <button onclick="closeSettings()" class="inline-flex items-center justify-center gap-2 rounded-md border border-border bg-background text-foreground hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] dark:bg-input/30 dark:border-input dark:hover:bg-input/50">
          Cancel
        </button>
        <button onclick="saveSettings()" class="inline-flex items-center justify-center gap-2 rounded-md bg-primary text-primary-foreground hover:bg-primary/90 h-9 px-4 py-2 text-sm font-medium transition-all outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px]">
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
